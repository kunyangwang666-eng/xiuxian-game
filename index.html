<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>无限修仙模拟器·第二阶段</title>

<style>
body{
    background:#0b0f1a;
    color:#d4c7ff;
    font-family:Microsoft YaHei;
    text-align:center;
}

#box{
    width:70%;
    margin:auto;
    margin-top:30px;
    padding:20px;
    border:1px solid #3a2f5a;
    background:#11162a;
    border-radius:10px;
}

button{
    margin:8px;
    padding:10px;
    background:#2b1d4a;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#432a78;
}
</style>
</head>

<body>

<h1>🌌 无限修仙模拟器 · 第二阶段</h1>

<div id="box">
    <div id="story">你踏入修仙世界……</div>
    <div id="npc"></div>
    <div id="options"></div>
</div>

<script>

let state = JSON.parse(localStorage.getItem("xiuxian")) || {
    cultivation:0,
    dao:0,
    demon:0,
    karma:0,
    npc:{}
};

let npcs = [
    "❄ 冷月仙子",
    "⚔ 玄天剑子",
    "🩸 墨玄魔尊",
    "🌿 青衣医女"
];

function save(){
    localStorage.setItem("xiuxian", JSON.stringify(state));
}

function rand(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function encounterNPC(){
    let npc = rand(npcs);

    if(!state.npc[npc]){
        state.npc[npc] = 0;
    }

    document.getElementById("npc").innerText =
        "你遇见了：" + npc + "（好感：" + state.npc[npc] + "）";

    return npc;
}

function generate(){
    let places = ["青云宗","幽冥山","凡尘城","天机阁","魔域裂缝","九重天外"];

    let text = "你来到 " + rand(places) + "，灵气涌动。";

    let npc = encounterNPC();

    let options = [
        {
            t:"与其交谈",
            e:{karma:1},
            npcEffect:+1
        },
        {
            t:"切磋修为",
            e:{cultivation:1},
            npcEffect:+2
        },
        {
            t:"保持距离",
            e:{dao:1},
            npcEffect:0
        },
        {
            t:"暗中观察",
            e:{demon:1},
            npcEffect:-1
        }
    ];

    return {text, npc, options};
}

function apply(effect, npc){
    for(let k in effect){
        state[k] += effect[k];
    }

    if(npc){
        state.npc[npc] += 1;
    }

    save();
}

function render(){
    let data = generate();

    document.getElementById("story").innerText = data.text;

    let box = document.getElementById("options");
    box.innerHTML = "";

    data.options.forEach(opt=>{
        let btn = document.createElement("button");
        btn.innerText = opt.t;

        btn.onclick = function(){
            apply(opt.e, data.npc);
            render();
        };

        box.appendChild(btn);
    });
}

render();

</script>

</body>
</html>
